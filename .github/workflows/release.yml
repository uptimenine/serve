name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release Linux artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set calendar version
        id: version
        shell: bash
        run: |
          version="$(date -u +'%Y.%m').${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/serve-linux-amd64 \
            ./cmd/serve
          printf '%s\n' "$VERSION" > dist/VERSION
          (cd dist && sha256sum serve-linux-amd64 > SHA256SUMS)

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: serve-${{ steps.version.outputs.version }}-linux-amd64
          path: dist/
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes \
            dist/serve-linux-amd64 \
            dist/SHA256SUMS \
            dist/VERSION
